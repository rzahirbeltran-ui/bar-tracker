name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        run: npm install

      - name: Set NODE_BINARY for Xcode
        run: echo "export NODE_BINARY=$(which node)" > ios/.xcode.env.local

      - name: Install CocoaPods dependencies
        run: cd ios && pod install

      - name: Disable automatic code signing
        run: |
          PBXPROJ="ios/BarTracker.xcodeproj/project.pbxproj"
          sed -i '' 's/ProvisioningStyle = Automatic/ProvisioningStyle = Manual/g' "$PBXPROJ"
          sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' "$PBXPROJ"
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' "$PBXPROJ"

      - name: Build iOS app
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace ios/BarTracker.xcworkspace \
            -scheme BarTracker \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="$RUNNER_TEMP/build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            2>&1 | tee /tmp/xcode.log
          echo "Build exit: ${PIPESTATUS[0]}"

      - name: Upload Xcode log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-log
          path: /tmp/xcode.log
          retention-days: 3

      - name: Package as IPA
        run: |
          APP="$RUNNER_TEMP/build/Release-iphoneos/BarTracker.app"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP" && zip -r BarTracker.ipa Payload/
          ls -lh "$RUNNER_TEMP/BarTracker.ipa"

      - uses: actions/upload-artifact@v4
        with:
          name: BarTracker-ios
          path: ${{ runner.temp }}/BarTracker.ipa
          retention-days: 7
