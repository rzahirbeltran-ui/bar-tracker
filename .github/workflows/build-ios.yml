name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias npm
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Fix Podfile
        run: |
          sed -i '' '/:privacy_file_aggregation_enabled/d' ios/Podfile
          python3 -c "
          import re
          f = 'ios/Podfile'
          c = open(f).read()
          c = re.sub(r'(platform :ios[^\n]*\n)', r'\1use_modular_headers!\n', c)
          open(f,'w').write(c)
          print('Podfile patched')
          "

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      - name: Deshabilitar firma automática en project.pbxproj
        run: |
          PBXPROJ="ios/BarTracker.xcodeproj/project.pbxproj"
          # Cambiar ProvisioningStyle a Manual
          sed -i '' 's/ProvisioningStyle = Automatic/ProvisioningStyle = Manual/g' "$PBXPROJ"
          # Limpiar DEVELOPMENT_TEAM
          sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' "$PBXPROJ"
          # Limpiar provisioning profiles
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' "$PBXPROJ"
          echo "project.pbxproj patched"
          grep -c "ProvisioningStyle" "$PBXPROJ" || true

      - name: Compilar sin firmar
        run: |
          cd ios
          set +e
          xcodebuild build \
            -workspace BarTracker.xcworkspace \
            -scheme BarTracker \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="$RUNNER_TEMP/build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            CLANG_ENABLE_EXPLICIT_MODULES=NO \
            2>&1 | xcpretty --color
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e
          echo "=============================="
          echo "BUILD EXIT: $BUILD_EXIT"
          echo "=============================="
          echo "--- Contenido Release-iphoneos ---"
          ls "$RUNNER_TEMP/build/Release-iphoneos/" 2>/dev/null || echo "No existe"
          # Si el .app existe, el build funcionó aunque algún script post-build haya fallado
          if [ -d "$RUNNER_TEMP/build/Release-iphoneos/BarTracker.app" ]; then
            echo "BarTracker.app encontrado - OK"
            exit 0
          fi
          exit $BUILD_EXIT

      - name: Empaquetar como .ipa
        run: |
          APP="$RUNNER_TEMP/build/Release-iphoneos/BarTracker.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: No se encontro BarTracker.app"
            find "$RUNNER_TEMP/build" -name "*.app" -type d 2>/dev/null
            exit 1
          fi
          echo "App: $(du -sh "$APP" | cut -f1)"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r BarTracker.ipa Payload/
          echo "IPA: $(du -sh BarTracker.ipa | cut -f1)"

      - name: Subir .ipa como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: BarTracker-ios
          path: ${{ runner.temp }}/BarTracker.ipa
          retention-days: 7
