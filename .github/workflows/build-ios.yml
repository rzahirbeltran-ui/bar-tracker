name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias npm
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Fix Podfile
        run: |
          sed -i '' '/:privacy_file_aggregation_enabled/d' ios/Podfile
          python3 -c "
          import re
          f = 'ios/Podfile'
          c = open(f).read()
          c = re.sub(r'(platform :ios[^\n]*\n)', r'\1use_modular_headers!\n', c)
          open(f,'w').write(c)
          print('Podfile patched')
          "

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      - name: Deshabilitar firma automática
        run: |
          PBXPROJ="ios/BarTracker.xcodeproj/project.pbxproj"
          sed -i '' 's/ProvisioningStyle = Automatic/ProvisioningStyle = Manual/g' "$PBXPROJ"
          sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' "$PBXPROJ"
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' "$PBXPROJ"
          echo "pbxproj patched"

      - name: Apuntar Node.js para React Native bundler
        run: |
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env.local

      - name: Compilar sin firmar
        run: |
          cd ios
          set +e
          xcodebuild build \
            -workspace BarTracker.xcworkspace \
            -scheme BarTracker \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="$RUNNER_TEMP/build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            CLANG_ENABLE_EXPLICIT_MODULES=NO \
            CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES=YES \
            2>&1 | tee /tmp/xcode.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e
          echo "BUILD EXIT: $BUILD_EXIT"
          echo "=== ERRORES ==="
          grep -E "error:|fatal:|Killed|LLVM ERROR" /tmp/xcode.log \
            | grep -v "note:" | grep -v "will be run" | head -40
          APP="$RUNNER_TEMP/build/Release-iphoneos/BarTracker.app"
          echo "App size: $(du -sh "$APP" 2>/dev/null || echo '0B')"
          [ -f "$APP/BarTracker" ] && echo "Binary EXISTS - OK" && exit 0
          echo "Binary MISSING"
          exit $BUILD_EXIT

      - name: Subir log de Xcode (si falla)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-log
          path: /tmp/xcode.log
          retention-days: 3

      - name: Empaquetar como .ipa
        run: |
          APP="$RUNNER_TEMP/build/Release-iphoneos/BarTracker.app"
          if [ ! -f "$APP/BarTracker" ]; then
            echo "ERROR: binario no encontrado"
            exit 1
          fi
          echo "App: $(du -sh "$APP" | cut -f1)"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r BarTracker.ipa Payload/
          echo "IPA: $(du -sh BarTracker.ipa | cut -f1)"

      - name: Subir .ipa como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: BarTracker-ios
          path: ${{ runner.temp }}/BarTracker.ipa
          retention-days: 7
