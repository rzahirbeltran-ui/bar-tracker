name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:      # permite lanzarlo manualmente desde GitHub

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias npm
        run: npm install

      - name: Expo Prebuild (genera proyecto Xcode)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Fix Podfile
        run: |
          sed -i '' '/:privacy_file_aggregation_enabled/d' ios/Podfile
          python3 -c "
          import re, sys
          f = 'ios/Podfile'
          c = open(f).read()
          c = re.sub(r'(platform :ios[^\n]*\n)', r'\1use_modular_headers!\n', c)
          open(f,'w').write(c)
          print('Podfile patched')
          "

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      - name: Ver estructura generada
        run: ls ios/

      - name: Ver schemes disponibles
        run: |
          cd ios
          xcodebuild -workspace BarTracker.xcworkspace -list

      - name: Compilar sin firmar
        run: |
          cd ios
          xcodebuild archive \
            -workspace BarTracker.xcworkspace \
            -scheme BarTracker \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/BarTracker.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            SKIP_INSTALL=NO > /tmp/xcode.log 2>&1
          EXIT=$?
          echo "=== ERRORES ==="
          grep -E " error:|BUILD FAILED" /tmp/xcode.log || echo "(ninguno visible)"
          echo "=== ULTIMAS 30 LINEAS ==="
          tail -30 /tmp/xcode.log
          exit $EXIT

      - name: Empaquetar como .ipa
        run: |
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$RUNNER_TEMP/BarTracker.xcarchive/Products/Applications/BarTracker.app" \
                "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r BarTracker.ipa Payload/

      - name: Subir .ipa como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: BarTracker-ios
          path: ${{ runner.temp }}/BarTracker.ipa
          retention-days: 7
