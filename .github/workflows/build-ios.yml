name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias npm
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Fix Podfile
        run: |
          sed -i '' '/:privacy_file_aggregation_enabled/d' ios/Podfile
          python3 -c "
          import re
          f = 'ios/Podfile'
          c = open(f).read()
          c = re.sub(r'(platform :ios[^\n]*\n)', r'\1use_modular_headers!\n', c)
          open(f,'w').write(c)
          print('Podfile patched')
          "

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      - name: Compilar sin firmar
        run: |
          cd ios
          xcodebuild build \
            -workspace BarTracker.xcworkspace \
            -scheme BarTracker \
            -configuration Release \
            -destination "generic/platform=iOS" \
            SYMROOT="$RUNNER_TEMP/build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            2>&1 | tee /tmp/xcode.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "=============================="
          echo "BUILD EXIT CODE: $BUILD_EXIT"
          echo "=============================="
          grep " error:" /tmp/xcode.log | head -30 || true
          echo "--- ULTIMAS 20 LINEAS ---"
          tail -20 /tmp/xcode.log
          echo "--- BUILD DIR ---"
          ls "$RUNNER_TEMP/build/Release-iphoneos/" 2>/dev/null || echo "Release-iphoneos no existe"
          exit $BUILD_EXIT

      - name: Empaquetar como .ipa
        run: |
          APP="$RUNNER_TEMP/build/Release-iphoneos/BarTracker.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: No se encontro BarTracker.app en $APP"
            find "$RUNNER_TEMP/build" -name "*.app" -type d 2>/dev/null
            exit 1
          fi
          echo "App encontrada ($(($(du -sk "$APP" | cut -f1) / 1024)) MB)"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r BarTracker.ipa Payload/
          echo "IPA size: $(du -sh BarTracker.ipa | cut -f1)"

      - name: Subir .ipa como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: BarTracker-ios
          path: ${{ runner.temp }}/BarTracker.ipa
          retention-days: 7
