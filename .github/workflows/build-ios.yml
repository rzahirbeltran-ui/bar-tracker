name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:      # permite lanzarlo manualmente desde GitHub

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias npm
        run: npm install

      - name: Expo Prebuild (genera proyecto Xcode)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Fix Podfile
        run: |
          sed -i '' '/:privacy_file_aggregation_enabled/d' ios/Podfile
          python3 -c "
          import re, sys
          f = 'ios/Podfile'
          c = open(f).read()
          c = re.sub(r'(platform :ios[^\n]*\n)', r'\1use_modular_headers!\n', c)
          open(f,'w').write(c)
          print('Podfile patched')
          "

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      - name: Compilar sin firmar
        run: |
          set -o pipefail
          cd ios
          xcodebuild build \
            -workspace BarTracker.xcworkspace \
            -scheme BarTracker \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="$RUNNER_TEMP/build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            2>&1 | grep -E "error:|BUILD FAILED|BUILD SUCCEEDED|fatal" || true
          EXIT=${PIPESTATUS[0]}
          echo "--- xcodebuild exited with: $EXIT ---"
          echo "--- Contenido de build dir ---"
          ls -la "$RUNNER_TEMP/build/" 2>/dev/null || echo "build dir no existe"
          ls -la "$RUNNER_TEMP/build/Release-iphoneos/" 2>/dev/null || echo "Release-iphoneos no existe"
          exit $EXIT

      - name: Empaquetar como .ipa
        run: |
          APP="$RUNNER_TEMP/build/Release-iphoneos/BarTracker.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: No se encontro $APP"
            find "$RUNNER_TEMP/build" -name "*.app" -type d 2>/dev/null || echo "Ninguna .app encontrada"
            exit 1
          fi
          echo "App encontrada: $APP"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r BarTracker.ipa Payload/
          ls -lh BarTracker.ipa

      - name: Subir .ipa como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: BarTracker-ios
          path: ${{ runner.temp }}/BarTracker.ipa
          retention-days: 7
